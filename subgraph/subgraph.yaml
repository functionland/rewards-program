specVersion: 1.3.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: RewardsProgram
    network: base
    source:
      address: "0x3BE7914Bf3eCfee640f00988397e5e86598b4565"
      abi: RewardsProgram
      startBlock: 44106300
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ContractEvent
      abis:
        - name: RewardsProgram
          file: ./abis/RewardsProgram.json
      eventHandlers:
        - event: TokensDeposited(indexed uint256,indexed uint32,indexed address,uint256,uint8,string)
          handler: handleTokensDeposited
        - event: TokensTransferredToMember(indexed uint32,indexed address,indexed address,uint256,bool,uint32,uint8,uint8,string)
          handler: handleTokensTransferredToMember
        - event: TokensTransferredToParent(indexed uint32,indexed address,indexed address,uint256,string)
          handler: handleTokensTransferredToParent
        - event: TokensWithdrawn(indexed uint32,indexed address,uint256)
          handler: handleTokensWithdrawn
        - event: TimeLockResolved(indexed uint32,indexed address,uint256)
          handler: handleTimeLockResolved
        - event: MemberAdded(indexed uint32,indexed address,indexed address,uint8,uint8,bytes12)
          handler: handleMemberAdded
        - event: ProgramAdminAssigned(indexed uint32,indexed address,bytes12)
          handler: handleProgramAdminAssigned
        - event: MemberRemoved(indexed uint32,indexed address)
          handler: handleMemberRemoved
        - event: MemberClaimed(indexed uint32,indexed address,indexed address)
          handler: handleMemberClaimed
        - event: MemberWalletChanged(indexed uint32,indexed address,address,address)
          handler: handleMemberWalletChanged
        - event: MemberIDUpdated(indexed uint32,indexed address,bytes12,bytes12)
          handler: handleMemberIDUpdated
        - event: MemberTypeChanged(indexed uint32,indexed address,uint8,uint8)
          handler: handleMemberTypeChanged
        - event: ProgramCreated(indexed uint32,bytes8,string)
          handler: handleProgramCreated
        - event: ProgramUpdated(indexed uint32,string)
          handler: handleProgramUpdated
        - event: ProgramDeactivated(indexed uint32)
          handler: handleProgramDeactivated
        - event: TransferLimitUpdated(indexed uint32,uint8,uint8)
          handler: handleTransferLimitUpdated
        - event: RewardTypeAdded(indexed uint32,indexed uint8,bytes16)
          handler: handleRewardTypeAdded
        - event: RewardTypeRemoved(indexed uint32,indexed uint8)
          handler: handleRewardTypeRemoved
        - event: SubTypeAdded(indexed uint32,indexed uint8,uint8,bytes16)
          handler: handleSubTypeAdded
        - event: SubTypeRemoved(indexed uint32,indexed uint8,uint8)
          handler: handleSubTypeRemoved
      file: ./src/mapping.ts
