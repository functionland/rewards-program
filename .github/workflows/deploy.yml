name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_REWARDS_PROGRAM_ADDRESS: ${{ vars.NEXT_PUBLIC_REWARDS_PROGRAM_ADDRESS }}
          NEXT_PUBLIC_STAKING_POOL_ADDRESS: ${{ vars.NEXT_PUBLIC_STAKING_POOL_ADDRESS }}
          NEXT_PUBLIC_FULA_TOKEN_ADDRESS: ${{ vars.NEXT_PUBLIC_FULA_TOKEN_ADDRESS }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_DEFAULT_CHAIN: ${{ vars.NEXT_PUBLIC_DEFAULT_CHAIN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
